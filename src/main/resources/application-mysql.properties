# MySQL profile (reserved)
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/wordapp?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${MYSQL_USER:wordapp}

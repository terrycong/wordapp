<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>错题统计 · 单词大冒险</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="container py-4">
    <h3 class="mb-3"><i class="bi bi-bar-chart"></i> 错题统计</h3>
    <div class="row g-3 mb-4">
        <div class="col-md-6">
            <div class="card text-bg-light"><div class="card-body">
                <h6 class="text-muted mb-2">累计答题</h6>
                <h2 class="mb-0" th:text="${totalReview}">0</h2>
            </div></div>
        </div>
        <div class="col-md-6">
            <div class="card text-bg-light"><div class="card-body">
                <h6 class="text-muted mb-2">累计错题</h6>
                <h2 class="mb-0 text-danger" th:text="${totalWrong}">0</h2>
            </div></div>
        </div>
    </div>

    <div class="card">
        <div class="card-header"><i class="bi bi-trophy"></i> 最常错的单词 TOP 50</div>
        <div class="table-responsive">
            <table class="table table-striped table-hover mb-0">
                <thead><tr>
                    <th>#</th><th>单词</th><th>音标</th><th>释义</th>
                    <th class="text-center">错次</th>
                    <th class="text-center">对次</th>
                    <th class="text-center">阶段</th>
                    <th class="text-center">状态</th>
                </tr></thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(rows)}">
                    <td colspan="8" class="text-center text-muted py-4">还没有错题，继续加油 🎉</td>
                </tr>
                <tr th:each="p, it : ${rows}">
                    <td th:text="${it.count}">1</td>
                    <td>
                        <strong th:text="${wordMap.get(p.wordId)?.spelling ?: '?'}">word</strong>
                    </td>
                    <td class="text-muted small" th:text="${wordMap.get(p.wordId)?.phonetic ?: ''}"></td>
                    <td th:text="${wordMap.get(p.wordId)?.meaning ?: ''}">释义</td>
                    <td class="text-center text-danger fw-bold" th:text="${p.wrongCount}">0</td>
                    <td class="text-center text-success" th:text="${p.correctCount}">0</td>
                    <td class="text-center" th:text="${p.stage}">0</td>
                    <td class="text-center">
                        <span th:if="${p.mastered}" class="badge text-bg-success">已掌握</span>
                        <span th:unless="${p.mastered}" class="badge text-bg-secondary">学习中</span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
<script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>首页 · 单词大冒险</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>

<main class="container py-4">
    <div class="row g-3 mb-4">
        <div class="col-12">
            <div class="alert alert-primary mb-0">
                <h4 class="mb-1">你好, <span th:text="${user.displayName ?: user.username}">用户</span> 👋</h4>
                <small>今日目标 <strong th:text="${dailyGoal}">20</strong> 个，已完成 <strong th:text="${todayDone}">0</strong> 个</small>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card text-bg-info h-100"><div class="card-body text-center">
                <i class="bi bi-clock-history fs-2"></i>
                <h3 class="mt-2 mb-0" th:text="${due}">0</h3>
                <small>到期复习</small>
            </div></div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card text-bg-success h-100"><div class="card-body text-center">
                <i class="bi bi-check-circle fs-2"></i>
                <h3 class="mt-2 mb-0" th:text="${mastered}">0</h3>
                <small>已掌握</small>
            </div></div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card text-bg-warning h-100"><div class="card-body text-center">
                <i class="bi bi-x-circle fs-2"></i>
                <h3 class="mt-2 mb-0" th:text="${todayWrong}">0</h3>
                <small>今日错题</small>
            </div></div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card text-bg-secondary h-100"><div class="card-body text-center">
                <i class="bi bi-bookmark fs-2"></i>
                <h3 class="mt-2 mb-0" th:text="${total}">0</h3>
                <small>已加入词库</small>
            </div></div>
        </div>
    </div>

    <div class="row g-3">
        <div class="col-md-7">
            <div class="card h-100">
                <div class="card-body">
                    <h5 class="card-title"><i class="bi bi-rocket"></i> 立即开始</h5>
                    <p class="text-muted small">混合题型自动出题，错了重来，对了进入下一个艾宾浩斯节点。</p>
                    <div class="d-grid gap-2 d-md-flex flex-wrap">
                        <a class="btn btn-primary" th:href="@{/study}"><i class="bi bi-play-fill"></i> 开始学习</a>
                        <a class="btn btn-outline-primary btn-sm" th:href="@{/study(type='SPELL')}"><i class="bi bi-keyboard"></i> 只练拼写</a>
                        <a class="btn btn-outline-primary btn-sm" th:href="@{/study(type='LISTEN_CHOICE')}"><i class="bi bi-headphones"></i> 只练听音</a>
                        <a class="btn btn-outline-primary btn-sm" th:href="@{/study(type='CN_TO_EN')}"><i class="bi bi-translate"></i> 中→英</a>
                        <a class="btn btn-outline-primary btn-sm" th:href="@{/study(type='EN_TO_CN')}"><i class="bi bi-translate"></i> 英→中</a>
                    </div>
                    <hr>
                    <small class="text-muted">
                        累计答题 <strong th:text="${totalReview}">0</strong> 次，错误 <strong class="text-danger" th:text="${totalWrong}">0</strong> 次。
                        <a th:href="@{/stats}">查看错题统计 →</a>
                    </small>
                </div>
            </div>
        </div>
        <div class="col-md-5">
            <div class="card h-100">
                <div class="card-body">
                    <h5 class="card-title"><i class="bi bi-gear"></i> 每日目标设置</h5>
                    <form th:action="@{/settings/daily-goal}" method="post" class="row g-2 align-items-end">
                        <div class="col">
                            <label class="form-label small">每天背单词数量</label>
                            <input type="number" name="dailyGoal" class="form-control"
                                   th:value="${dailyGoal}" min="1" max="200" required>
                        </div>
                        <div class="col-auto">
                            <button class="btn btn-success" type="submit"><i class="bi bi-save"></i> 保存</button>
                        </div>
                    </form>
                    <hr>
                    <a class="btn btn-outline-secondary btn-sm w-100" th:href="@{/textbooks}">
                        <i class="bi bi-journal-bookmark"></i> 选择 / 调整 课本
                    </a>
                </div>
            </div>
        </div>
    </div>
</main>

<footer class="text-center text-muted small py-3 border-top mt-5">
    单词大冒险 · v<span th:text="${appVersion}">dev</span> · build <span th:text="${buildDate}">unknown</span>
</footer>

<script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>
</body>
</html>

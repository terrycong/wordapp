<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>登录 · 单词大冒险</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css}">
</head>
<body class="bg-light">
<div class="container" style="max-width: 420px; margin-top: 8vh;">
    <div class="card shadow-sm">
        <div class="card-body p-4">
            <h3 class="text-center mb-4"><i class="bi bi-book-half text-primary"></i> 单词大冒险</h3>
            <div th:if="${param.error}" class="alert alert-danger py-2">用户名或密码错误</div>
            <div th:if="${param.logout}" class="alert alert-info py-2">您已安全退出</div>
            <div th:if="${param.registered}" class="alert alert-success py-2">注册成功，请登录</div>
            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label class="form-label">用户名</label>
                    <input type="text" name="username" class="form-control" required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label">密码</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">登录</button>
            </form>
            <hr>
            <div class="text-center">
                还没有账号? <a th:href="@{/register}">立即注册</a>
            </div>
            <div class="text-muted small text-center mt-3">
                默认管理员: admin / admin123
            </div>
        </div>
    </div>
</div>
</body>
</html>

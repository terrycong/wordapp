<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>注册 · 单词大冒险</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
</head>
<body class="bg-light">
<div class="container" style="max-width: 420px; margin-top: 8vh;">
    <div class="card shadow-sm">
        <div class="card-body p-4">
            <h3 class="text-center mb-4">注册账号</h3>
            <div th:if="${error}" class="alert alert-danger py-2" th:text="${error}"></div>
            <form th:action="@{/register}" method="post">
                <div class="mb-3">
                    <label class="form-label">用户名 <span class="text-danger">*</span></label>
                    <input type="text" name="username" class="form-control" required minlength="3" maxlength="64">
                </div>
                <div class="mb-3">
                    <label class="form-label">昵称（可选）</label>
                    <input type="text" name="displayName" class="form-control" maxlength="64">
                </div>
                <div class="mb-3">
                    <label class="form-label">密码 <span class="text-danger">*</span></label>
                    <input type="password" name="password" class="form-control" required minlength="4">
                </div>
                <button type="submit" class="btn btn-success w-100">注册</button>
            </form>
            <hr>
            <div class="text-center">
                已有账号? <a th:href="@{/login}">去登录</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
